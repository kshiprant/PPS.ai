<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FA.bot Fraud AI</title>
  <link rel="stylesheet" href="css/style.css">
  <script defer src="js/app.js"></script>
</head>
<body>
  <div id="container" class="light">
    <header class="header">
      <div class="logo">FA.bot</div>
      <div class="settings-container">
        <div class="menu-icon" id="menu-icon">⋮</div>
        <div class="settings-dropdown" id="settings-dropdown">
          <div>
            <strong>View Mode:</strong>
            <button id="view-mobile">Phone</button>
            <button id="view-desktop">Desktop</button>
          </div>
          <div>
            <strong>Theme:</strong>
            <button id="theme-light">Light</button>
            <button id="theme-dark">Dark</button>
          </div>
          <div>
            <strong>Chat Color:</strong>
            <input type="color" id="chat-color" value="#4f46e5">
          </div>
        </div>
      </div>
    </header>

    <main class="chat-panel" id="chat-panel"></main>

    <div class="input-container">
      <input type="text" id="chat-input" placeholder="Type your query..." />
      <button id="send-btn">Send</button>
    </div>
  </div>
</body>
</html>
